# 仅 main 分支推送时，取消旧的工作流
name: Cancel Previous Workflows

on:
  push:
    branches:
      - main  # 仅监听 main 分支

# 必需权限
permissions:
  actions: write

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel outdated workflows
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          # 取消所有工作流（构建/发布/检查等全部终止）
          workflow_id: all
          # 仅作用于 main 分支
          only_branches: main
          # 强制取消：进行中(in_progress) + 等待中(queued) 任务
          ignore_sha: true