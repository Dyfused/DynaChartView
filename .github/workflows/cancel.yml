# 仅 main 分支推送时，取消旧的工作流
name: Cancel Previous Workflows

on:
  push:
    branches:
      - main  # 仅监听 main 分支

# 必需权限
permissions:
  actions: write

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel outdated workflows
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          workflow_id: all