name: CI

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

# 取消之前的运行（同一 PR 的新提交会取消旧的）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 全局 CMake 配置
  BUILD_TYPE: Release

jobs:
  # ==================== Linux 构建 ====================
  linux:
    name: Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        compiler: [gcc, clang]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (GCC)
        if: matrix.compiler == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ \
            cmake \
            libopencv-dev \
            libfreetype6-dev

      - name: Install dependencies (Clang)
        if: matrix.compiler == 'clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libopencv-dev \
            libfreetype6-dev

      - name: Create build directory
        run: mkdir -p build && cd build

      - name: Configure (GCC)
        if: matrix.compiler == 'gcc'
        run: |
          cd build
          CC=gcc CXX=g++ cmake .. \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_SHARED_LIBS=OFF \
            -DOpenCV_STATIC=ON

      - name: Configure (Clang)
        if: matrix.compiler == 'clang'
        run: |
          cd build
          CC=clang CXX=clang++ cmake .. \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_SHARED_LIBS=OFF \
            -DOpenCV_STATIC=ON

      - name: Build
        run: |
          cd build
          cmake --build . -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dynachartview-linux-${{ matrix.compiler }}
          path: build/bin/
          retention-days: 7

  # ==================== Windows 构建 ====================
  windows:
    name: Windows (${{ matrix.build_type }})
    runs-on: windows-latest
    
    strategy:
      matrix:
        build_type: [Release, Debug]
        include:
          - build_type: Release
            config: Release
          - build_type: Debug
            config: Debug
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install OpenCV (vcpkg)
        run: |
          # 克隆 vcpkg
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg.exe install opencv4:x64-windows freetype:x64-windows

      - name: Create build directory
        run: mkdir build

      - name: Configure
        run: |
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} `
            -DCMAKE_TOOLCHAIN_FILE=C:/Users/runneradmin/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DBUILD_SHARED_LIBS=OFF `
            -DOpencv_STATIC=ON

      - name: Build
        run: |
          cd build
          cmake --build . --config ${{ matrix.config }} -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dynachartview-windows-${{ matrix.build_type }}
          path: build/bin/
          retention-days: 7

  # ==================== macOS 构建 ====================
  macos:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-latest
    
    strategy:
      matrix:
        arch: [x86_64, arm64]
      fail-fast: false
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install cmake opencv freetype

      - name: Create build directory
        run: mkdir -p build && cd build

      - name: Configure (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES="x86_64" \
            -DBUILD_SHARED_LIBS=OFF

      - name: Configure (arm64)
        if: matrix.arch == 'arm64'
        run: |
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build
        run: |
          cd build
          cmake --build . -j$(sysctl -n hw.ncpu)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dynachartview-macos-${{ matrix.arch }}
          path: build/bin/
          retention-days: 7

  # ==================== 代码质量检查 ====================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ \
            cmake \
            libopencv-dev \
            libfreetype6-dev \
            cppcheck

      - name: Create build directory
        run: mkdir -p build && cd build

      - name: Configure
        run: |
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build
        run: |
          cd build
          cmake --build . -j$(nproc)

      - name: Run cppcheck
        run: |
          cd build
          cppcheck --enable=all --inconclusive --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            ../ChartStore/src/ \
            ../ImageGenerator/src/ \
            ../src/
