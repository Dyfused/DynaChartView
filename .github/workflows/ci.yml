name: CI Build & Smart Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
    paths:
      - .github/workflows/ci.yml
      - '**/CMakeLists.txt'
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'
  pull_request:
    branches: [ main, master ]
    paths:
      - .github/workflows/ci.yml
      - '**/CMakeLists.txt'
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'

concurrency:
  group: ${{ github.workspace }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_TYPE: Release
  # 全局禁用交互，彻底解决tzdata卡死问题
  DEBIAN_FRONTEND: noninteractive

jobs:
  # ==============================================
  # 仅 Tag 执行：检查是否已有构建产物
  # ==============================================
  check-artifact:
    name: Check Existing Artifact
    runs-on: ubuntu-24.04
    if: github.ref_type == 'tag'
    outputs:
      artifact_exists: ${{ steps.check.outputs.artifact_exists }}
    steps:
      - uses: actions/checkout@v4
      - name: Get commit SHA
        id: get_commit
        run: echo "sha=$(git rev-parse ${{ github.ref }})" >> $GITHUB_OUTPUT
      - name: Try download artifacts
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit: ${{ steps.get_commit.outputs.sha }}
          path: ./temp
      - name: Check artifact status
        id: check
        run: |
          if [ -d "./temp/ubuntu-20.04-amd64-gcc" ]; then
            echo "artifact_exists=true" >> $GITHUB_OUTPUT
          else
            echo "artifact_exists=false" >> $GITHUB_OUTPUT
          fi

  # ==============================================
  # Ubuntu 构建（格式规范 + 无跳过问题）
  # ==============================================
  build-ubuntu:
    name: Ubuntu ${{ matrix.version }} ${{ matrix.arch }} (${{ matrix.compiler }})
    runs-on: ${{ matrix.run_on }}
    timeout-minutes: 20
    needs: check-artifact
    if: |
      always() &&
      (github.ref_type != 'tag' || 
       (github.ref_type == 'tag' && needs.check-artifact.outputs.artifact_exists == 'false'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "24.04"
            arch: amd64
            compiler: gcc
            use_runner: true
            run_on: ubuntu-24.04
          - version: "24.04"
            arch: amd64
            compiler: clang
            use_runner: true
            run_on: ubuntu-24.04
          - version: "24.04"
            arch: arm64
            compiler: gcc
            use_runner: true
            run_on: ubuntu-24.04-arm
          - version: "20.04"
            arch: amd64
            compiler: gcc
            use_runner: false
            run_on: ubuntu-24.04
          - version: "20.04"
            arch: arm64
            compiler: gcc
            use_runner: false
            run_on: ubuntu-24.04
    steps:
      - uses: docker/setup-qemu-action@v3
        if: ${{ !matrix.use_runner }}
      - uses: actions/checkout@v4
      - name: Build
        run: |
          if [ "${{ matrix.use_runner }}" = "true" ]; then
            # 非交互安装，彻底解决tzdata卡住
            sudo apt update -y
            sudo apt install -y build-essential make cmake clang libopencv-dev libfreetype6-dev
            mkdir -p build && cd build
            if [ "${{ matrix.compiler }}" = "gcc" ]; then
              CC=gcc CXX=g++ cmake .. -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
            else
              CC=clang CXX=clang++ cmake .. -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
            fi
            make -j$(nproc)
          else
            docker run --rm --platform linux/${{ matrix.arch }} \
              -e DEBIAN_FRONTEND=noninteractive \
              -v ${{ github.workspace }}:/workspace -w /workspace ubuntu:${{ matrix.version }} bash -c "
              apt update -y
              apt install -y build-essential make cmake libopencv-dev libfreetype6-dev
              mkdir build && cd build
              CC=gcc CXX=g++ cmake .. -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
              make -j$(nproc)
            "
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ubuntu-${{ matrix.version }}-${{ matrix.arch }}-${{ matrix.compiler }}
          path: build/bin/
          retention-days: 30

  # ==============================================
  # Fedora 构建
  # ==============================================
  build-fedora:
    name: Fedora ${{ matrix.version }} ${{ matrix.arch }} (gcc)
    runs-on: ubuntu-24.04
    needs: check-artifact
    timeout-minutes: 20
    if: |
      always() &&
      (github.ref_type != 'tag' || 
       (github.ref_type == 'tag' && needs.check-artifact.outputs.artifact_exists == 'false'))
    strategy:
      fail-fast: false
      matrix:
        version: ["40"]
        arch: [amd64, arm64]
    steps:
      - uses: docker/setup-qemu-action@v3
      - uses: actions/checkout@v4
      - name: Build
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} -v ${{ github.workspace }}:/workspace -w /workspace fedora:${{ matrix.version }} bash -c "
            dnf install -y make cmake gcc-c++ opencv-devel freetype-devel
            mkdir build && cd build
            cmake .. -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
            make -j$(nproc)
          "
      - uses: actions/upload-artifact@v4
        with:
          name: fedora-${{ matrix.version }}-${{ matrix.arch }}-gcc
          path: build/bin/
          retention-days: 30

  # ==============================================
  # Windows 构建
  # ==============================================
  build-windows:
    name: Windows ${{ matrix.arch }} ${{ matrix.type }}
    runs-on: ${{ matrix.run_on }}
    needs: check-artifact
    timeout-minutes: 75
    if: |
      always() &&
      (github.ref_type != 'tag' || 
       (github.ref_type == 'tag' && needs.check-artifact.outputs.artifact_exists == 'false'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            type: dynamic
            run_on: windows-latest
          - arch: x64
            type: static
            run_on: windows-latest
          - arch: arm64
            type: dynamic
            run_on: windows-11-arm
          - arch: arm64
            type: static
            run_on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
      - name: Set vcpkg triplet
        id: triplet
        shell: pwsh
        run: |
          if ("${{ matrix.type }}" -eq "static") {
            echo "TRIPLET=${{ matrix.arch }}-windows-static" >> $env:GITHUB_OUTPUT
          } else {
            echo "TRIPLET=${{ matrix.arch }}-windows" >> $env:GITHUB_OUTPUT
          }
      - name: Install dependencies
        run: .\vcpkg\vcpkg install opencv4 freetype --triplet ${{ steps.triplet.outputs.TRIPLET }}
      # ✅ 核心：完全按你的 CMakeLists.txt 传参，不手动覆盖运行时库
      - name: Configure CMake
        shell: pwsh
        run: |
          mkdir build
          cd build
          # 动态编译：OpenCV_STATIC=OFF（匹配CMake默认值）
          if("${{ matrix.type }}" -eq "dynamic") {
            cmake .. -G "Visual Studio 17 2022" -A ${{ matrix.arch }} `
              -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
              -DVCPKG_TARGET_TRIPLET="${{ steps.triplet.outputs.TRIPLET }}" `
              -DCMAKE_BUILD_TYPE=Release `
              -DOpenCV_STATIC=OFF
          }
          # 静态编译：OpenCV_STATIC=ON（触发CMake里的/MT静态运行时）
          else {
            cmake .. -G "Visual Studio 17 2022" -A ${{ matrix.arch }} `
              -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
              -DVCPKG_TARGET_TRIPLET="${{ steps.triplet.outputs.TRIPLET }}" `
              -DCMAKE_BUILD_TYPE=Release `
              -DOpenCV_STATIC=ON
          }
      
      - name: Build
        run: |
          cd build
          cmake --build . --config Release
      - name: Upload dynamic artifact
        if: matrix.type == 'dynamic'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: build/bin/Release/
          retention-days: 30
      - name: Upload static artifact
        if: matrix.type == 'static'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-static
          path: build/bin/Release/*.exe
          retention-days: 30

  # ==============================================
  # macOS 构建
  # ==============================================
  build-macos:
    name: macOS arm64 (Clang)
    runs-on: macos-14
    needs: check-artifact
    timeout-minutes: 20
    if: |
      always() &&
      (github.ref_type != 'tag' || 
       (github.ref_type == 'tag' && needs.check-artifact.outputs.artifact_exists == 'false'))
    steps:
      - uses: actions/checkout@v4
      - run: brew install cmake opencv freetype
      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
          make -j$(sysctl -n hw.ncpu)
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-clang
          path: build/bin/
          retention-days: 30

  # ==============================================
  # 发布任务（仅 Tag 执行）
  # ==============================================
  release:
    name: Package & Release
    runs-on: ubuntu-24.04
    needs: [build-ubuntu, build-fedora, build-windows, build-macos]
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4
      - name: Get commit SHA
        id: get_commit
        run: echo "sha=$(git rev-parse ${{ github.ref }})" >> $GITHUB_OUTPUT
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit: ${{ steps.get_commit.outputs.sha }}
          path: ./artifacts
      - name: Package to required zip
        run: |
          mkdir -p release
          zip -j release/ubuntu-20.04-amd64.zip artifacts/ubuntu-20.04-amd64-gcc/*
          zip -j release/ubuntu-20.04-arm64.zip artifacts/ubuntu-20.04-arm64-gcc/*
          zip -j release/macos-arm64.zip artifacts/macos-arm64-clang/*
          zip -j release/windows-x64.zip artifacts/windows-x64/*
          zip -j release/windows-arm64.zip artifacts/windows-arm64/*
          zip -j release/windows-x64-static.zip artifacts/windows-x64-static/*
          zip -j release/windows-arm64-static.zip artifacts/windows-arm64-static/*
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}