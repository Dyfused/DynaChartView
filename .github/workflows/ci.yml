name: CI Build
# 核心：仅 源码/Cmake/CI配置 变化时触发
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
    paths:
      - .github/workflows/ci.yml
      - '**/CMakeLists.txt'    # ✅ 递归匹配所有底层/子目录的CMakeLists.txt
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'               # 补充C源码（可选，通用兼容）
  pull_request:
    branches: [ main, master ]
    paths:
      - .github/workflows/ci.yml
      - '**/CMakeLists.txt'    # ✅ 递归匹配所有底层/子目录的CMakeLists.txt
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'

concurrency:
  group: ${{ github.workspace }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build-ubuntu:
    name: Ubuntu ${{ matrix.version }} ${{ matrix.arch }} (${{ matrix.compiler }})
    # 核心修改：根据arch动态匹配正确的runner标签
    runs-on: ${{ matrix.run_on }}
    strategy:
      matrix:
        include:
          # amd64 原生 runner → 标签 ubuntu-24.04
          - version: "24.04"
            arch: amd64
            compiler: gcc
            use_runner: true
            run_on: ubuntu-24.04
          - version: "24.04"
            arch: amd64
            compiler: clang
            use_runner: true
            run_on: ubuntu-24.04
          # arm64 原生 runner → 标签 ubuntu-24.04-arm
          - version: "24.04"
            arch: arm64
            compiler: gcc
            use_runner: true
            run_on: ubuntu-24.04-arm
          # Docker 构建 → 通用标签 ubuntu-24.04
          - version: "20.04"
            arch: amd64
            compiler: gcc
            use_runner: false
            run_on: ubuntu-24.04
          - version: "20.04"
            arch: arm64
            compiler: gcc
            use_runner: false
            run_on: ubuntu-24.04
      fail-fast: false
    steps:
      - name: Set up QEMU for multi-architecture
        if: ${{ !matrix.use_runner }}
        uses: docker/setup-qemu-action@v3
      
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (GitHub Runner native)
        if: ${{ matrix.use_runner }}
        run: |
          sudo apt update --fix-missing && sudo apt install -y --fix-broken --no-install-recommends \
            build-essential make cmake clang libopencv-dev libfreetype6-dev

      - name: Build and compile (GitHub Runner native)
        if: ${{ matrix.use_runner }}
        run: |
          mkdir -p build && cd build
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            CC=gcc CXX=g++ cmake .. -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
          else
            CC=clang CXX=clang++ cmake .. -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
          fi
          make -j$(nproc)
          

      - name: Build and compile (Docker)
        if: ${{ !matrix.use_runner }}
        run: |
          docker run --rm \
            --platform linux/${{ matrix.arch }} \
            -e DEBIAN_FRONTEND=noninteractive \
            -e TZ=UTC \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ubuntu:${{ matrix.version }} \
            /bin/bash -c "
              apt update --fix-missing && apt install -y --fix-broken --no-install-recommends \
                build-essential make cmake clang libopencv-dev libfreetype6-dev
              mkdir -p build && cd build
              if [ \"${{ matrix.compiler }}\" = \"gcc\" ]; then
                CC=gcc CXX=g++ cmake .. -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
              else
                CC=clang CXX=clang++ cmake .. -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
              fi
              make -j$(nproc)
            "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4  # 修正：补充actions/前缀
        with:
          name: ubuntu-${{ matrix.version }}-${{ matrix.arch }}-${{ matrix.compiler }}
          path: build/bin/
          retention-days: 7

  build-fedora:
    name: Fedora ${{ matrix.version }} ${{ matrix.arch }} (gcc)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        version: ["40"]
        arch: [amd64, arm64]
      fail-fast: false

    steps:
      - name: Set up QEMU for multi-architecture
        uses: docker/setup-qemu-action@v3
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build and compile
        run: |
          docker run --rm \
            --platform linux/${{ matrix.arch }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            fedora:${{ matrix.version }} \
            /bin/bash -c "
              dnf install -y \
                --setopt=retries=5 \
                --skip-broken \
                --allowerasing \
                make cmake gcc-c++ opencv-devel freetype-devel git
              mkdir -p build && cd build
              CC=gcc CXX=g++ cmake .. -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
              make -j$(nproc)
            "
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4  # 修正：补充actions/前缀
        with:
          name: fedora-${{ matrix.version }}-${{ matrix.arch }}-gcc
          path: build/bin/
          retention-days: 7

  build-windows:
    name: Windows ${{ matrix.arch }} ${{ matrix.type }}
  # ✅ 直接引用矩阵定义的 runner 标签，无复杂表达式
    runs-on: ${{ matrix.run_on }}
    strategy:
      matrix:
        include:
          - arch: x64
            type: dynamic
            run_on: windows-latest
          - arch: x64
            type: static
            run_on: windows-latest
          - arch: arm64
            type: dynamic
            run_on: windows-11-arm
          - arch: arm64
            type: static
            run_on: windows-11-arm
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat

      - name: Install dependencies
        run: |
          if("${{ matrix.type }}" -eq "static") {
            $TRIPLET = "${{ matrix.arch }}-windows-static"
          } else {
            $TRIPLET = "${{ matrix.arch }}-windows"
          }
          .\vcpkg\vcpkg install opencv4 freetype --triplet $TRIPLET

      - name: Configure CMake
        run: |
          # ========== 核心修复：动态/静态自动切换 ==========
          if("${{ matrix.type }}" -eq "static") {
            $TRIPLET = "${{ matrix.arch }}-windows-static"
            $OPENCV_STATIC = "ON"
          } else {
            $TRIPLET = "${{ matrix.arch }}-windows"
            $OPENCV_STATIC = "OFF"
          }

          mkdir build
          cd build

          cmake .. -G "Visual Studio 17 2022" -A ${{ matrix.arch }} `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="$TRIPLET" `
            -DOpenCV_STATIC="$OPENCV_STATIC" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_FIND_DEBUG_MODE=ON

      - name: Build
        run: |
          cd build
          cmake --build . --config Release
          
      # There's no need to package
      - name: Upload dynamic artifact
        if: matrix.type == 'dynamic'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: build/bin/Release/
          retention-days: 7

      - name: Upload static exe artifact
        if: matrix.type == 'static'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-static
          path: build/bin/Release/*.exe
          retention-days: 7

  build-macos:
    name: macOS arm64 (Clang)
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install cmake opencv freetype
      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}
          make -j$(sysctl -n hw.ncpu)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4  # 修正：补充actions/前缀
        with:
          name: macos-arm64-clang
          path: build/bin/
          retention-days: 7
